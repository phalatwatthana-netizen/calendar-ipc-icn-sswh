<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- นำเข้า Tailwind CSS เพื่อความสวยงาม -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; }
  </style>
</head>
<body class="bg-[#CFE8F3] p-4 md:p-6">

  <div class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-lg shadow-md border-t-4 border-[#00BFA5]">
    <h2 class="text-2xl font-bold text-[#1E88E5] mb-6 text-center">ระบบบันทึกนัดหมายและกิจกรรม</h2>
    
    <!-- เมนู Tabs สำหรับสลับฟอร์ม -->
    <div class="flex flex-col md:flex-row border-b border-[#E6EEF2] mb-6 rounded-t-lg overflow-hidden">
      <button id="tabGeneral" onclick="switchTab('general')" class="w-full md:w-1/2 py-3 font-semibold text-center bg-[#1E88E5] text-white transition-colors duration-300">
        📅 กิจกรรมทั่วไป
      </button>
      <button id="tabBlood" onclick="switchTab('blood')" class="w-full md:w-1/2 py-3 font-semibold text-center bg-gray-100 text-gray-500 hover:bg-[#CFE8F3] transition-colors duration-300">
        🩸 นัดติดตามผลเลือด
      </button>
    </div>

    <!-- ========================================== -->
    <!-- ฟอร์มที่ 1: กิจกรรมทั่วไป -->
    <!-- ========================================== -->
    <div id="formGeneral" class="block">
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-2">หัวข้อ/ชื่อกิจกรรม:</label>
        <input type="text" id="genTitle" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="เช่น ประชุมทีม, ตรวจเยี่ยมแผนก">
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">วันที่:</label>
          <input type="date" id="genDate" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">เวลาเริ่มต้น:</label>
          <input type="time" id="genStartTime" value="08:00" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">เวลาสิ้นสุด (ถ้ามี):</label>
          <input type="time" id="genEndTime" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]">
        </div>
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">รายละเอียด / สถานที่:</label>
        <textarea id="genDescription" rows="3" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="ระบุรายละเอียดเพิ่มเติม"></textarea>
      </div>

      <button onclick="submitGeneral()" id="btnGeneral" class="w-full bg-gradient-to-r from-[#1E88E5] to-[#26C6DA] hover:from-[#1565C0] hover:to-[#00897B] text-white font-bold py-3 px-4 rounded-md transition duration-300 shadow-lg">
        บันทึกกิจกรรมลงปฏิทิน
      </button>
    </div>

    <!-- ========================================== -->
    <!-- ฟอร์มที่ 2: นัดติดตามผลเลือด (ซ่อนไว้เป็นค่าเริ่มต้น) -->
    <!-- ========================================== -->
    <div id="formBlood" class="hidden">
      <!-- ส่วนที่ 1: ข้อมูลผู้ป่วย -->
      <div class="mb-6 bg-white p-4 rounded-md border border-[#E6EEF2] shadow-sm">
        <label class="block text-[#00897B] font-bold mb-3">ข้อมูลผู้ป่วย:</label>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-semibold mb-2">CODE (รหัส):</label>
            <input type="text" id="patientCode" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="ระบุรหัส CODE">
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-2">HN:</label>
            <input type="text" id="patientHN" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="ระบุ HN">
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-2">ชื่อ-สกุล:</label>
            <input type="text" id="patientName" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="ชื่อ-สกุลผู้ป่วย">
          </div>
          <div>
            <label class="block text-gray-700 font-semibold mb-2">เบอร์โทรศัพท์:</label>
            <input type="tel" id="patientPhone" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="เบอร์โทรศัพท์ติดต่อ">
          </div>
        </div>
      </div>

      <!-- ส่วนที่ 2: รายการเจาะเลือด (อ้างอิงตามบัตรนัด) -->
      <div class="mb-6 bg-white p-4 rounded-md border border-[#E6EEF2] shadow-sm">
        <label class="block text-[#00897B] font-bold mb-3">รายการตรวจติดตามผลเลือด (เลือกตามครั้งที่นัด):</label>
        
        <!-- ครั้งที่ 1 -->
        <div class="mb-3 border-b border-[#E6EEF2] pb-2">
          <span class="font-semibold text-[#1E88E5]">ครั้งที่ 1 :</span>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="CBC (ครั้งที่ 1)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">CBC</span></label>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="LFT (ครั้งที่ 1)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">LFT</span></label>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="Cr (ครั้งที่ 1)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">Cr</span></label>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="SGPT (ครั้งที่ 1)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">SGPT</span></label>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="SGOT (ครั้งที่ 1)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">SGOT</span></label>
        </div>

        <!-- ครั้งที่ 2 -->
        <div class="mb-3 border-b border-[#E6EEF2] pb-2">
          <span class="font-semibold text-[#1E88E5]">ครั้งที่ 2 (Month 1) :</span>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="Anti HIV (ครั้งที่ 2)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">Anti HIV</span></label>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="HCV VL (ครั้งที่ 2)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">HCV VL</span></label>
        </div>

        <!-- ครั้งที่ 3 -->
        <div class="mb-3 border-b border-[#E6EEF2] pb-2">
          <span class="font-semibold text-[#1E88E5]">ครั้งที่ 3 (Month 3) :</span>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="Anti HIV (ครั้งที่ 3)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">Anti HIV</span></label>
        </div>

        <!-- ครั้งที่ 4 -->
        <div class="mb-3 pt-1">
          <span class="font-semibold text-[#1E88E5]">ครั้งที่ 4 (Month 6) :</span>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="Anti HIV (ครั้งที่ 4)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">Anti HIV</span></label>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="HBsAg (ครั้งที่ 4)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">HBsAg</span></label>
          <label class="inline-flex items-center ml-3"><input type="checkbox" name="labTest" value="Anti-HCV (ครั้งที่ 4)" class="h-4 w-4 accent-[#00BFA5]"><span class="ml-2 text-gray-700">Anti-HCV</span></label>
        </div>

        <!-- รายการอื่นๆ -->
        <div class="mt-4 pt-3 border-t border-[#E6EEF2] flex flex-col md:flex-row md:items-center">
          <label class="inline-flex items-center mb-2 md:mb-0 whitespace-nowrap">
            <input type="checkbox" id="labOtherCheck" class="h-4 w-4 accent-[#00BFA5]">
            <span class="ml-2 font-semibold text-[#1E88E5]">อื่นๆ (ระบุ):</span>
          </label>
          <input type="text" id="labOtherText" class="md:ml-3 w-full px-3 py-1.5 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="พิมพ์รายการตรวจเพิ่มเติม">
        </div>
      </div>

      <!-- ส่วนที่ 3: วันและเวลา -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">วันที่นัดหมาย:</label>
          <input type="date" id="eventDate" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">เวลานัดหมาย:</label>
          <input type="time" id="eventStartTime" value="08:00" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]">
        </div>
      </div>

      <!-- หมายเหตุเพิ่มเติม -->
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">หมายเหตุเพิ่มเติม (ถ้ามี):</label>
        <textarea id="eventDescription" rows="2" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-[#26C6DA]" placeholder="เช่น ให้งดน้ำงดอาหาร"></textarea>
      </div>

      <button onclick="submitBloodTest()" id="btnBlood" class="w-full bg-gradient-to-r from-[#00897B] to-[#00BFA5] hover:from-[#00695C] hover:to-[#00897B] text-white font-bold py-3 px-4 rounded-md transition duration-300 shadow-lg">
        บันทึกนัดเจาะเลือด
      </button>
    </div>

  </div>

  <script>
    // ฟังก์ชันสำหรับสลับแท็บ
    function switchTab(tabName) {
      const formGeneral = document.getElementById('formGeneral');
      const formBlood = document.getElementById('formBlood');
      const tabGeneralBtn = document.getElementById('tabGeneral');
      const tabBloodBtn = document.getElementById('tabBlood');

      if (tabName === 'general') {
        formGeneral.classList.remove('hidden');
        formBlood.classList.add('hidden');
        
        tabGeneralBtn.className = "w-full md:w-1/2 py-3 font-semibold text-center bg-[#1E88E5] text-white transition-colors duration-300";
        tabBloodBtn.className = "w-full md:w-1/2 py-3 font-semibold text-center bg-gray-100 text-gray-500 hover:bg-[#CFE8F3] transition-colors duration-300";
      } else {
        formGeneral.classList.add('hidden');
        formBlood.classList.remove('hidden');
        
        tabBloodBtn.className = "w-full md:w-1/2 py-3 font-semibold text-center bg-[#00897B] text-white transition-colors duration-300";
        tabGeneralBtn.className = "w-full md:w-1/2 py-3 font-semibold text-center bg-gray-100 text-gray-500 hover:bg-[#CFE8F3] transition-colors duration-300";
      }
    }

    // ฟังก์ชันส่งข้อมูลฟอร์มกิจกรรมทั่วไป
    function submitGeneral() {
      const btn = document.getElementById('btnGeneral');
      btn.innerText = 'กำลังบันทึกข้อมูล...';
      btn.disabled = true;

      var data = {
        type: 'general', // กำหนดประเภทให้ฝั่ง GS รู้
        title: document.getElementById('genTitle').value,
        date: document.getElementById('genDate').value,
        startTime: document.getElementById('genStartTime').value,
        endTime: document.getElementById('genEndTime').value,
        description: document.getElementById('genDescription').value
      };

      if(!data.title || !data.date || !data.startTime) {
        alert("กรุณากรอกหัวข้อ วันที่ และเวลาเริ่มต้นให้ครบถ้วน");
        btn.innerText = 'บันทึกกิจกรรมลงปฏิทิน';
        btn.disabled = false;
        return;
      }

      sendData(data, btn, 'บันทึกกิจกรรมลงปฏิทิน', function() {
        document.getElementById('genTitle').value = '';
        document.getElementById('genDescription').value = '';
      });
    }

    // ฟังก์ชันส่งข้อมูลฟอร์มนัดเจาะเลือด
    function submitBloodTest() {
      const btn = document.getElementById('btnBlood');
      btn.innerText = 'กำลังบันทึกข้อมูล...';
      btn.disabled = true;

      let selectedLabs = [];
      let checkboxes = document.querySelectorAll('input[name="labTest"]:checked');
      checkboxes.forEach((cb) => { selectedLabs.push(cb.value); });

      // ตรวจสอบข้อมูลในช่อง "อื่นๆ"
      let otherCheck = document.getElementById('labOtherCheck');
      let otherText = document.getElementById('labOtherText').value.trim();
      if (otherCheck.checked && otherText !== '') {
        selectedLabs.push("อื่นๆ: " + otherText);
      }

      var data = {
        type: 'blood_test', // กำหนดประเภทให้ฝั่ง GS รู้
        code: document.getElementById('patientCode').value,
        hn: document.getElementById('patientHN').value,
        name: document.getElementById('patientName').value,
        phone: document.getElementById('patientPhone').value,
        labs: selectedLabs.join(', '), 
        date: document.getElementById('eventDate').value,
        startTime: document.getElementById('eventStartTime').value,
        description: document.getElementById('eventDescription').value
      };

      if(!data.code || !data.date || !data.startTime) {
        alert("กรุณากรอก CODE ผู้ป่วย, วันที่ และเวลานัดหมายให้ครบถ้วน");
        btn.innerText = 'บันทึกนัดเจาะเลือด';
        btn.disabled = false;
        return;
      }

      sendData(data, btn, 'บันทึกนัดเจาะเลือด', function() {
        document.getElementById('patientCode').value = '';
        document.getElementById('patientHN').value = '';
        document.getElementById('patientName').value = '';
        document.getElementById('patientPhone').value = '';
        document.getElementById('labOtherCheck').checked = false;
        document.getElementById('labOtherText').value = '';
        document.getElementById('eventDescription').value = '';
        checkboxes.forEach((cb) => cb.checked = false);
      });
    }

    // ฟังก์ชันส่งข้อมูลไปหลังบ้าน
    function sendData(data, btnElement, originalBtnText, clearFormCallback) {
      google.script.run
        .withSuccessHandler(function(response) {
          alert(response.message);
          if(response.success) {
            clearFormCallback(); // ล้างฟอร์มเมื่อสำเร็จ
          }
          btnElement.innerText = originalBtnText;
          btnElement.disabled = false;
        })
        .saveEventFromWebApp(data);
    }
  </script>
</body>
</html>
